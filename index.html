<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Real-time Character Counter</h2>
    <textarea name="text-zone" maxlength="100" id="text-zone" placeholder="Please write your text here ... "></textarea>
    <div class="counter-zone">
    <p >Total Characters : <span id="total-counter"></span></p>
    <p >Remaining : <span id="remaining-counter"></span></p>
   
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
